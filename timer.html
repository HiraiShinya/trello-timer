<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <style>
  *{box-sizing:border-box;margin:0;padding:0;}
  .board{background:#0079bf;padding:16px;border-radius:8px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;}
  .section-label{font-size:11px;color:#fff;opacity:0.8;font-weight:500;margin-bottom:6px;}
  .settings-box{background:rgba(255,255,255,0.15);border-radius:6px;padding:10px 12px;margin-bottom:12px;}
  .settings-title{font-size:12px;color:#fff;font-weight:500;margin-bottom:8px;}
  .member-settings{display:flex;flex-wrap:wrap;gap:8px;}
  .member-setting-item{background:#fff;border-radius:6px;padding:8px 10px;display:flex;align-items:center;gap:8px;min-width:140px;}
  .photo-upload-area{width:36px;height:36px;border-radius:50%;border:2px dashed #c1c7d0;display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;flex-shrink:0;position:relative;}
  .photo-upload-area img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
  .photo-upload-area input{position:absolute;opacity:0;width:100%;height:100%;cursor:pointer;}
  .photo-placeholder{font-size:16px;color:#c1c7d0;}
  .member-setting-name{font-size:12px;color:#172b4d;font-weight:500;}
  .member-setting-hint{font-size:10px;color:#888;margin-top:1px;}
  .list{background:#ebecf0;border-radius:6px;padding:8px;width:100%;}
  .list-title{font-size:13px;font-weight:500;color:#172b4d;padding:4px 8px 10px;}
  .card{background:#fff;border-radius:6px;padding:10px 12px;margin-bottom:10px;border:1px solid #dfe1e6;}
  .card-header{display:flex;align-items:flex-start;gap:10px;margin-bottom:6px;}
  .card-icon{width:38px;height:38px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
  .card-meta{flex:1;}
  .card-title{font-size:13px;color:#172b4d;font-weight:500;margin-bottom:4px;}
  .active-faces{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px;min-height:0;}
  .face-chip{width:28px;height:28px;border-radius:50%;overflow:hidden;border:2px solid #fff;box-shadow:0 0 0 1px #dfe1e6;flex-shrink:0;background:#f4f5f7;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;}
  .face-chip img{width:100%;height:100%;object-fit:cover;}
  .label{font-size:10px;padding:2px 6px;border-radius:3px;font-weight:500;margin-bottom:4px;display:inline-block;}
  .lbl-y{background:#f5dd29;color:#7a5800;}
  .lbl-r{background:#eb5a46;color:#7a1a0d;}
  .lbl-g{background:#61bd4f;color:#1d6127;}
  .add-row{display:flex;gap:6px;align-items:center;margin-bottom:8px;flex-wrap:wrap;}
  .member-sel{font-size:12px;padding:3px 6px;border-radius:4px;border:1px solid #c1c7d0;background:#f4f5f7;color:#172b4d;height:28px;cursor:pointer;}
  .btn-add{font-size:12px;padding:0 12px;border-radius:4px;border:none;background:#0079bf;color:#fff;cursor:pointer;height:28px;white-space:nowrap;font-weight:500;}
  .btn-add:hover{background:#005fa3;}
  .btn-stopall{font-size:12px;padding:0 12px;border-radius:4px;border:none;background:#172b4d;color:#fff;cursor:pointer;height:28px;white-space:nowrap;font-weight:500;display:none;}
  .btn-stopall:hover{background:#091e42;}
  .timer-row{display:flex;align-items:center;gap:6px;border-radius:4px;padding:5px 8px;margin-bottom:4px;}
  .timer-row.running{background:#f4f5f7;}
  .timer-row.paused{background:#fff3f3;border:1px solid #ffd5d0;}
  .t-avatar{width:26px;height:26px;border-radius:50%;overflow:hidden;flex-shrink:0;background:#e0e2e6;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;}
  .t-avatar img{width:100%;height:100%;object-fit:cover;}
  .timer-name{font-size:12px;color:#172b4d;font-weight:500;flex:1;}
  .status-badge{font-size:10px;padding:1px 6px;border-radius:3px;white-space:nowrap;}
  .badge-running{background:#e3fcef;color:#006644;}
  .badge-paused{background:#fff0ec;color:#bf2600;}
  .timer-val{font-size:12px;font-weight:500;font-family:monospace;min-width:65px;text-align:right;}
  .timer-val.running{color:#eb5a46;}
  .timer-val.paused{color:#888;}
  .btn-toggle{font-size:11px;padding:0 8px;border-radius:3px;border:none;cursor:pointer;height:22px;white-space:nowrap;}
  .btn-running{background:#eb5a46;color:#fff;}
  .btn-running:hover{background:#c9372c;}
  .btn-paused{background:#0079bf;color:#fff;}
  .btn-paused:hover{background:#005fa3;}
  .log-box{background:rgba(255,255,255,0.15);border-radius:6px;padding:10px 12px;margin-top:12px;}
  .log-title{font-size:12px;color:#fff;font-weight:500;margin-bottom:6px;}
  .log-item{font-size:11px;color:#fff;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.15);display:flex;justify-content:space-between;align-items:center;}
  .log-item:last-child{border-bottom:none;}
  .empty-log{font-size:11px;color:rgba(255,255,255,0.5);}
  </style>
</head>
<body>

<div class="board">
  <div class="settings-box">
    <div class="settings-title">作業者 顔写真設定（全員にリアルタイム同期されます）</div>
    <div class="member-settings" id="memberSettings"></div>
  </div>

  <div class="list">
    <div class="list-title">作業中</div>
    <div id="dynamic-cards-container">
       <div style="padding:10px; font-size:12px; color:#5e6c84;">Trelloからカードを読み込み中...</div>
    </div>
  </div>

  <div class="log-box">
    <div class="log-title">計測ログ（リアルタイム同期）</div>
    <div id="logList"><div class="empty-log">まだ記録がありません</div></div>
  </div>
</div>

<script type="module">
  // Firebaseの各種機能を読み込み
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getDatabase, ref, onValue, set, update, push } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

  // あなたの「魔法の鍵」
  const firebaseConfig = {
    apiKey: "AIzaSyCZSImS2hTSASLj9NfCpCMOWsT54d9hh7k",
    authDomain: "trello-timerbb.firebaseapp.com",
    databaseURL: "https://trello-timerbb-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "trello-timerbb",
    storageBucket: "trello-timerbb.firebasestorage.app",
    messagingSenderId: "1082057229145",
    appId: "1:1082057229145:web:93166029c94b58617fc248"
  };

  // Firebaseを起動
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // === グローバル変数の準備 ===
  var MEMBERS = ['田中','佐藤','鈴木','山田'];
  var memberPhotos = {};
  var colorIdx = 0;
  var memberColors = {};
  var palettes = [{bg:'#B5D4F4',fg:'#0C447C'},{bg:'#9FE1CB',fg:'#085041'},{bg:'#F5C4B3',fg:'#712B13'},{bg:'#FAC775',fg:'#633806'},{bg:'#C0DD97',fg:'#27500A'}];
  
  // 状態管理用キャッシュ
  let currentFirebaseTimers = {};
  let localTimers = {}; // 時計の秒針を動かすための入れ物

  // Trelloの準備
  var t = window.TrelloPowerUp.iframe();


  // ==========================================
  // 1. Firebase リアルタイム監視（データが降ってくる）
  // ==========================================

  // 📷 顔写真の同期
  onValue(ref(db, 'photos'), (snapshot) => {
    memberPhotos = snapshot.val() || {};
    buildSettings();
    refreshAllTimerAvatars();
    // 画面にカードが描画されていれば顔アイコンも更新
    document.querySelectorAll('.card').forEach(cardEl => {
        let facesEl = cardEl.querySelector('.active-faces');
        if(facesEl) refreshFaceChips(facesEl.id.replace('faces_', ''));
    });
  });

  // ⏱️ タイマー状態の同期
  onValue(ref(db, 'timers'), (snapshot) => {
    currentFirebaseTimers = snapshot.val() || {};
    renderAllTimers();
  });

  // 📝 ログの同期
  onValue(ref(db, 'logs'), (snapshot) => {
    renderLogs(snapshot.val() || {});
  });


  // ==========================================
  // 2. Trelloからタスク（カード）を取得
  // ==========================================
  t.render(function(){
    fetchTrelloCards();
  });

  function fetchTrelloCards() {
    Promise.all([
      t.lists('id', 'name'),
      t.cards('id', 'name', 'idList', 'labels')
    ]).then(function(values) {
      var lists = values[0];
      var cards = values[1];
      var targetList = lists.find(list => list.name === '作業中');
      var container = document.getElementById('dynamic-cards-container');

      if (!targetList) {
        container.innerHTML = '<div style="padding:10px; font-size:12px; color:#eb5a46; background:#fff; border-radius:4px;">「作業中」リストが見つかりません。</div>';
        return;
      }

      var targetCards = cards.filter(card => card.idList === targetList.id);
      renderCards(targetCards);
    });
  }

  function renderCards(cards) {
    var container = document.getElementById('dynamic-cards-container');
    container.innerHTML = ''; 

    if (cards.length === 0) {
       container.innerHTML = '<div style="padding:10px; font-size:12px; color:#5e6c84; background:#fff; border-radius:4px;">現在「作業中」のタスクはありません。</div>';
       return;
    }

    cards.forEach(card => {
      var cardId = card.id;
      var labelHtml = '';
      if (card.labels && card.labels.length > 0) {
         var lbl = card.labels[0];
         var colorClass = lbl.color === 'red' ? 'lbl-r' : (lbl.color === 'green' ? 'lbl-g' : 'lbl-y');
         labelHtml = '<span class="label ' + colorClass + '">' + (lbl.name || 'ラベル') + '</span>';
      }

      var cardHtml = `
        <div class="card">
          <div class="card-header">
            <div class="card-icon" style="background:#f4f5f7;">📋</div>
            <div class="card-meta">
              ${labelHtml}
              <div class="card-title">${card.name}</div>
            </div>
          </div>
          <div class="active-faces" id="faces_${cardId}"></div>
          <div class="add-row">
            <select class="member-sel" id="sel_${cardId}"><option value="">作業者を選択</option></select>
            <button class="btn-add" id="addbtn_${cardId}">+ 追加</button>
            <button class="btn-stopall" id="stopall_${cardId}">&#9646;&#9646; 全員停止</button>
          </div>
          <div id="rows_${cardId}"></div>
        </div>
      `;
      container.insertAdjacentHTML('beforeend', cardHtml);

      // セレクトボックスの用意
      var sel = document.getElementById('sel_' + cardId);
      MEMBERS.forEach(name => {
        var opt = document.createElement('option');
        opt.value = name; opt.textContent = name;
        sel.appendChild(opt);
      });

      // ボタンのイベントを登録
      setupCardActions(cardId, card.name);
    });

    // カードの枠が完成したので、Firebaseのデータに合わせてタイマーを描画
    renderAllTimers();
  }


  // ==========================================
  // 3. タイマーの描画とアクション
  // ==========================================
  function setupCardActions(cardId, cardName) {
    document.getElementById('addbtn_' + cardId).addEventListener('click', () => {
      var sel = document.getElementById('sel_' + cardId);
      var member = sel.value;
      if(!member){sel.style.border='2px solid #eb5a46';setTimeout(()=>{sel.style.border='1px solid #c1c7d0'},1200);return;}
      var key = cardId + '_' + member;
      if (currentFirebaseTimers[key]) return; // 既に存在する場合は無視

      sel.value = '';
      // Firebaseに「追加・開始」を書き込む
      set(ref(db, 'timers/' + key), {
        cardId: cardId, cardName: cardName, member: member,
        state: 'running', startTime: Date.now(), accumulated: 0
      });
      addLogToFirebase(member, cardName, 0, true);
    });

    document.getElementById('stopall_' + cardId).addEventListener('click', () => {
      for (let key in currentFirebaseTimers) {
        let data = currentFirebaseTimers[key];
        if (data.cardId === cardId && data.state === 'running') {
          let elapsed = data.accumulated + Math.floor((Date.now() - data.startTime) / 1000);
          update(ref(db, 'timers/' + key), { state: 'paused', accumulated: elapsed, startTime: null });
          addLogToFirebase(data.member, data.cardName, elapsed, false);
        }
      }
    });
  }

  function renderAllTimers() {
    // 1. Firebaseにあるタイマーを画面に生成・更新
    for (let key in currentFirebaseTimers) {
      let data = currentFirebaseTimers[key];
      let rowsContainer = document.getElementById('rows_' + data.cardId);
      if (!rowsContainer) continue; // カードがまだ読み込まれていない場合はスキップ

      let rowEl = document.getElementById('row_' + key);
      if (!rowEl) {
        rowEl = createRowEl(key, data);
        rowsContainer.appendChild(rowEl);
      }
      updateRowVisuals(rowEl, key, data);
    }

    // 2. Firebaseから消えたタイマー（誰かが削除した等）があれば画面からも消す
    document.querySelectorAll('.timer-row').forEach(row => {
       let key = row.id.replace('row_', '');
       if (!currentFirebaseTimers[key]) {
          if (localTimers[key]) { clearInterval(localTimers[key]); delete localTimers[key]; }
          row.remove();
       }
    });

    // 3. 各カードの顔アイコンと全員停止ボタンの表示を調整
    document.querySelectorAll('.card').forEach(cardEl => {
        let facesEl = cardEl.querySelector('.active-faces');
        if(facesEl) {
            let cardId = facesEl.id.replace('faces_', '');
            refreshFaceChips(cardId);
            updateStopAllBtn(cardId);
        }
    });
  }

  function createRowEl(key, data) {
    var rowEl = document.createElement('div');
    rowEl.id = 'row_' + key;
    rowEl.dataset.member = data.member;

    var av = makeAvatarEl(data.member, 26);
    av.dataset.member = data.member;

    var ns = document.createElement('span'); ns.className='timer-name'; ns.textContent=data.member;
    var badge = document.createElement('span'); badge.className='status-badge badge-status';
    var vs = document.createElement('span'); vs.className='timer-val val-text';
    var tb = document.createElement('button'); tb.className='btn-toggle btn-action';

    rowEl.appendChild(av); rowEl.appendChild(ns); rowEl.appendChild(badge); rowEl.appendChild(vs); rowEl.appendChild(tb);

    tb.addEventListener('click', () => { toggleFirebaseTimer(key); });
    return rowEl;
  }

  function updateRowVisuals(rowEl, key, data) {
    let badge = rowEl.querySelector('.badge-status');
    let vs = rowEl.querySelector('.val-text');
    let tb = rowEl.querySelector('.btn-action');

    if (data.state === 'running') {
      rowEl.className = 'timer-row running';
      badge.className = 'status-badge badge-running badge-status'; badge.textContent = '計測中';
      vs.className = 'timer-val running val-text';
      tb.className = 'btn-toggle btn-running btn-action'; tb.textContent = '停止';

      // 1秒ごとに画面の時間を進める
      if (!localTimers[key]) {
        localTimers[key] = setInterval(() => {
          vs.textContent = fmt(data.accumulated + Math.floor((Date.now() - data.startTime) / 1000));
        }, 1000);
      }
      vs.textContent = fmt(data.accumulated + Math.floor((Date.now() - data.startTime) / 1000));
    } else {
      rowEl.className = 'timer-row paused';
      badge.className = 'status-badge badge-paused badge-status'; badge.textContent = '停止中';
      vs.className = 'timer-val paused val-text';
      vs.textContent = fmt(data.accumulated);
      tb.className = 'btn-toggle btn-paused btn-action'; tb.textContent = '再開';

      // 秒針を止める
      if (localTimers[key]) { clearInterval(localTimers[key]); delete localTimers[key]; }
    }
  }

  function toggleFirebaseTimer(key) {
    let data = currentFirebaseTimers[key];
    if (!data) return;

    if (data.state === 'running') {
      let elapsed = data.accumulated + Math.floor((Date.now() - data.startTime) / 1000);
      update(ref(db, 'timers/' + key), { state: 'paused', accumulated: elapsed, startTime: null });
      addLogToFirebase(data.member, data.cardName, elapsed, false);
    } else {
      update(ref(db, 'timers/' + key), { state: 'running', startTime: Date.now() });
      addLogToFirebase(data.member, data.cardName, data.accumulated, true);
    }
  }


  // ==========================================
  // 4. ユーティリティ・その他の描画機能
  // ==========================================
  function getColor(n){if(!memberColors[n]){memberColors[n]=palettes[colorIdx%palettes.length];colorIdx++;}return memberColors[n];}
  function fmt(s){return String(Math.floor(s/3600)).padStart(2,'0')+':'+String(Math.floor((s%3600)/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');}

  function makeAvatarEl(member, size){
    var wrap = document.createElement('div');
    wrap.className = 't-avatar'; wrap.style.width = size+'px'; wrap.style.height = size+'px';
    if(memberPhotos[member]){
      var img = document.createElement('img'); img.src = memberPhotos[member]; wrap.appendChild(img);
    } else {
      var col = getColor(member); wrap.style.background = col.bg; wrap.style.color = col.fg; wrap.textContent = member.slice(0,2);
    }
    return wrap;
  }

  function buildSettings(){
    var container = document.getElementById('memberSettings');
    container.innerHTML = '';
    MEMBERS.forEach(name => {
      var item = document.createElement('div'); item.className = 'member-setting-item';
      var uploadArea = document.createElement('div'); uploadArea.className = 'photo-upload-area';
      if(memberPhotos[name]){
        var img = document.createElement('img'); img.src = memberPhotos[name]; uploadArea.appendChild(img);
      } else {
        var ph = document.createElement('span'); ph.className = 'photo-placeholder'; ph.textContent = '+'; uploadArea.appendChild(ph);
      }

      var fileInput = document.createElement('input'); fileInput.type = 'file'; fileInput.accept = 'image/*';
      fileInput.addEventListener('change', e => {
        var file = e.target.files[0]; if(!file) return;
        var reader = new FileReader();
        reader.onload = ev => {
          // Firebaseに画像を保存（全ユーザーに瞬時に反映されます）
          set(ref(db, 'photos/' + name), ev.target.result);
        };
        reader.readAsDataURL(file);
      });
      uploadArea.appendChild(fileInput);

      var info = document.createElement('div');
      var nm = document.createElement('div'); nm.className = 'member-setting-name'; nm.textContent = name;
      var hint = document.createElement('div'); hint.className = 'member-setting-hint'; hint.textContent = memberPhotos[name] ? '登録済み' : '写真を追加';
      info.appendChild(nm); info.appendChild(hint);
      item.appendChild(uploadArea); item.appendChild(info); container.appendChild(item);
    });
  }

  function refreshFaceChips(cardId){
    var facesEl = document.getElementById('faces_' + cardId);
    if (!facesEl) return;
    facesEl.innerHTML = '';
    for (let key in currentFirebaseTimers) {
      let data = currentFirebaseTimers[key];
      if (data.cardId === cardId) {
        var chip = document.createElement('div'); chip.className = 'face-chip';
        chip.title = data.member + (data.state === 'running' ? ' (計測中)' : ' (停止中)');
        chip.style.opacity = data.state === 'running' ? '1' : '0.4';
        if(memberPhotos[data.member]){
          var img = document.createElement('img'); img.src = memberPhotos[data.member]; chip.appendChild(img);
        } else {
          var col = getColor(data.member); chip.style.background = col.bg; chip.style.color = col.fg; chip.style.fontSize = '10px'; chip.textContent = data.member.slice(0,2);
        }
        facesEl.appendChild(chip);
      }
    }
  }

  function refreshAllTimerAvatars(){
    document.querySelectorAll('.t-avatar[data-member]').forEach(el => {
      var member = el.dataset.member;
      el.innerHTML = '';
      if(memberPhotos[member]){
        var img = document.createElement('img'); img.src = memberPhotos[member]; el.appendChild(img);
        el.style.background = ''; el.style.color = '';
      } else {
        var col = getColor(member); el.style.background = col.bg; el.style.color = col.fg; el.textContent = member.slice(0,2);
      }
    });
  }

  function updateStopAllBtn(cardId){
    var btn = document.getElementById('stopall_' + cardId);
    if(!btn) return;
    let runningCount = 0;
    for (let key in currentFirebaseTimers) {
      if (currentFirebaseTimers[key].cardId === cardId && currentFirebaseTimers[key].state === 'running') runningCount++;
    }
    btn.style.display = runningCount >= 2 ? 'inline-block' : 'none';
  }

  function addLogToFirebase(member, cardName, seconds, isResume) {
    push(ref(db, 'logs'), { member: member, cardName: cardName, seconds: seconds, isResume: isResume, timestamp: Date.now() });
  }

  function renderLogs(logsObj) {
    var list = document.getElementById('logList');
    list.innerHTML = '';
    let logsArr = Object.values(logsObj).sort((a, b) => b.timestamp - a.timestamp); // 新しい順に並び替え
    
    if (logsArr.length === 0) {
        list.innerHTML = '<div class="empty-log">まだ記録がありません</div>'; return;
    }
    // 最新50件のみ表示
    logsArr.slice(0, 50).forEach(log => {
      var timeStr = new Date(log.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
      var el = document.createElement('div'); el.className = 'log-item';
      var left = document.createElement('div'); left.style.cssText = 'display:flex;align-items:center;gap:6px;';
      var av = makeAvatarEl(log.member, 20); av.dataset.member = log.member;
      var info = document.createElement('span');
      var lbl = log.isResume ? '<span style="opacity:0.5;font-size:10px;">[開始]</span> ' : '<span style="opacity:0.5;font-size:10px;">[停止]</span> ';
      info.innerHTML = '<b>'+log.member+'</b> '+lbl+'<span style="opacity:0.6;font-size:10px;">'+log.cardName+'</span>';
      left.appendChild(av); left.appendChild(info);
      var right = document.createElement('div'); right.style.cssText = 'display:flex;gap:8px;align-items:center;';
      right.innerHTML = '<span style="font-family:monospace;">'+fmt(log.seconds)+'</span><span style="opacity:0.5;font-size:10px;">'+timeStr+'</span>';
      el.appendChild(left); el.appendChild(right); list.appendChild(el);
    });
  }
</script>
</body>
</html>
