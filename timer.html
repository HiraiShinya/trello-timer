<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
  <script type="module" src="./js/app.js"></script>  
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>

<div class="header-area">
  <div class="settings-title">作業者（名前枠をタップでその人の居場所を検索🔍 / 左の丸枠タップで写真変更）</div>
  <div class="member-settings" id="memberSettings"></div>
</div>

<div class="main-board">
  <div class="lanes-panel" id="lanesContainer"></div>
  <div class="right-panel">
    <div class="hold-area">
      <div class="area-title">⏸️ 作業保留中（ここに置くとタイマー自動停止＆再開不可）</div>
      <div class="hold-dropzone" id="zone_hold"></div>
    </div>
    <div class="log-box">
      <div class="area-title">📝 計測ログ</div>
      <div class="log-list" id="logList"></div>
    </div>
  </div>
</div>

<div class="bottom-panel">
  <div class="area-title">📥 未割当案件（レーンに移動してください。ここへ戻すことはできません）</div>
  <div class="unassigned-dropzone" id="zone_unassigned">
    <div style="font-size:12px; color:#5e6c84;">Trelloからカードを読み込み中...</div>
  </div>
</div>

<div id="hidden-card-factory" style="display:none;"></div>

</body>
</html>
